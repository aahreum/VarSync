<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarSync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 12px;
      color: #1e1e1e;
      background: #fff;
      padding: 16px;
      width: 100%;
      min-width: 280px;
      box-sizing: border-box;
    }

    #resize-handle {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      opacity: 0.35;
      transition: opacity 0.15s;
      /* 3Г—3 м җ нҢЁн„ҙ */
      background-image:
        radial-gradient(circle, #888 1.2px, transparent 1.2px);
      background-size: 4px 4px;
      background-position: 2px 2px;
      background-repeat: repeat;
      -webkit-mask-image: linear-gradient(135deg, transparent 40%, #000 100%);
      mask-image: linear-gradient(135deg, transparent 40%, #000 100%);
    }

    #resize-handle:hover {
      opacity: 0.7;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1e1e1e;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 12px;
      color: #1e1e1e;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #18a0fb;
    }

    input::placeholder {
      color: #b0b0b0;
    }

    .checkbox-row {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #1e1e1e;
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #18a0fb;
      cursor: pointer;
      flex-shrink: 0;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 16px 0;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      height: 32px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-test {
      background: #f5f5f5;
      color: #1e1e1e;
    }

    #btn-test:hover:not(:disabled) {
      background: #e8e8e8;
    }

    #btn-sync {
      background: #18a0fb;
      color: #fff;
    }

    #btn-sync:hover:not(:disabled) {
      background: #0d8de0;
    }

    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }

    #status.info    { background: #e8f4fd; color: #0d5a8e; display: block; }
    #status.success { background: #e6f9ed; color: #1a7f3c; display: block; }
    #status.error   { background: #fdecea; color: #c0392b; display: block; }

    #status a {
      color: inherit;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>VarSync</h1>

  <div class="field">
    <label for="repo">GitHub Repository</label>
    <input id="repo" type="text" placeholder="owner/repo лҳҗлҠ” GitHub URL" />
  </div>

  <div class="field">
    <label for="token">Personal Access Token</label>
    <input id="token" type="password" placeholder="ghp_xxxxxxxxxxxx" />
  </div>

  <div class="field">
    <label for="branch">Base Branch</label>
    <input id="branch" type="text" placeholder="main" value="main" />
  </div>

  <div class="field">
    <label>лӮҙліҙлӮј к·ёлЈ№</label>
    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-primitive" checked />
        Primitive
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-semantics" checked />
        Semantics
      </label>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button id="btn-test">м—°кІ° н…ҢмҠӨнҠё</button>
    <button id="btn-sync">Sync to GitHub</button>
  </div>

  <div id="status"></div>

  <!-- лҰ¬мӮ¬мқҙмҰҲ н•ёл“Ө: л“ңлһҳк·ёлЎң н”Ңлҹ¬к·ёмқё м°Ҫ нҒ¬кё° мЎ°м Ҳ -->
  <div id="resize-handle" title="л“ңлһҳк·ён•ҳм—¬ нҒ¬кё° мЎ°м Ҳ"></div>

<script>
  // в”Җв”Җ лҰ¬мӮ¬мқҙмҰҲ н•ёл“Ө в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  (function () {
    const handle = document.getElementById('resize-handle');
    const MIN_W = 280, MIN_H = 280, MAX_W = 800, MAX_H = 800;

    let dragging = false;
    let startX, startY, startW, startH;

    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      startW = document.documentElement.clientWidth;
      startH = document.documentElement.clientHeight;
      e.preventDefault(); // л“ңлһҳк·ё мӨ‘ н…ҚмҠӨнҠё м„ нғқ л°©м§Җ
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const newW = Math.min(Math.max(startW + (e.clientX - startX), MIN_W), MAX_W);
      const newH = Math.min(Math.max(startH + (e.clientY - startY), MIN_H), MAX_H);
      parent.postMessage({ pluginMessage: { type: 'resize', width: newW, height: newH } }, '*');
    });

    document.addEventListener('mouseup', () => { dragging = false; });
  })();

  // в”Җв”Җ мғҒмҲҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const FILE_PATHS = {
    primitive: 'tokens/primitive.json',
    semantics: 'tokens/semantics.json',
  };
  const COMMIT_MESSAGES = {
    primitive: 'chore: sync figma primitive variables',
    semantics: 'chore: sync figma semantics variables',
  };
  const PR_TITLE = 'chore: sync figma variables';
  const PR_BODY  = 'Figma Variables Sync н”Ңлҹ¬к·ёмқём—җ мқҳн•ҙ мһҗлҸҷ мғқм„ұлҗң PRмһ…лӢҲлӢӨ.';
  const SYNC_TIMEOUT_MS = 15000;

  // в”Җв”Җ Sync мҡ”мІӯ мӢң UIм—җм„ң ліҙкҙҖн•ҳлҠ” нҢҢлқјлҜён„° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // tokenмқҖ plugin mainмңјлЎң м „лӢ¬н•ҳм§Җ м•Ҡкі  м—¬кё°м„ң кҙҖлҰ¬
  let pendingSyncParams = null;
  let syncTimeoutId = null;

  // в”Җв”Җ мң нӢё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function parseGitHubUrl(input) {
    const match = input.trim().match(/(?:github\.com\/)?([^/\s]+)\/([^/\s]+?)(?:\.git)?$/);
    return match ? { owner: match[1], repo: match[2] } : null;
  }

  /** мһ…л Ҙ нҸј к°’мқ„ н•ң лІҲм—җ мқҪм–ҙмҳӨлҠ” н—¬нҚј */
  function getFormValues() {
    const groups = [];
    if (document.getElementById('chk-primitive').checked) groups.push('primitive');
    if (document.getElementById('chk-semantics').checked) groups.push('semantics');
    return {
      repoInput: document.getElementById('repo').value,
      token: document.getElementById('token').value.trim(),
      baseBranch: document.getElementById('branch').value.trim() || 'main',
      groups,
    };
  }

  /**
   * мғҒнғң л©”мӢңм§ҖлҘј DOMмңјлЎң м•Ҳм „н•ҳкІҢ л ҢлҚ”л§Ғ (innerHTML лҜёмӮ¬мҡ© вҖ” XSS л°©м§Җ)
   * @param {'info'|'success'|'error'} type
   * @param {string[]} lines  - н‘ңмӢңн•  н…ҚмҠӨнҠё мӨ„ л°°м—ҙ
   * @param {{ url: string, label: string } | null} link - м„ нғқм Ғ л§ҒнҒ¬
   */
  function setStatus(type, lines, link = null) {
    const el = document.getElementById('status');
    el.className = type;
    el.textContent = '';

    lines.forEach((line, i) => {
      if (i > 0) el.appendChild(document.createElement('br'));
      el.appendChild(document.createTextNode(line));
    });

    if (link) {
      el.appendChild(document.createElement('br'));
      const a = document.createElement('a');
      a.href = link.url;
      a.target = '_blank';
      a.textContent = link.label;
      el.appendChild(a);
    }
  }

  function setLoading(isLoading) {
    document.getElementById('btn-test').disabled = isLoading;
    document.getElementById('btn-sync').disabled = isLoading;
  }

  function githubHeaders(token) {
    return {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28',
    };
  }

  /** UTF-8 л¬ёмһҗм—ҙмқ„ Base64лЎң м•Ҳм „н•ҳкІҢ мқёмҪ”л”© (TextEncoder мӮ¬мҡ©, unescape deprecated лҢҖмІҙ) */
  function toBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    for (const byte of bytes) {
      binary += String.fromCharCode(byte);
    }
    return btoa(binary);
  }

  // в”Җв”Җ GitHub API н—¬нҚј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function getBranchSha(owner, repo, branch, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${branch}`,
      { headers: githubHeaders(token) }
    );
    if (!res.ok) throw new Error(`лёҢлһңм№ҳ мЎ°нҡҢ мӢӨнҢЁ (${res.status})`);
    const data = await res.json();
    return data.object.sha;
  }

  async function getFileSha(owner, repo, path, branch, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,
      { headers: githubHeaders(token) }
    );
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(`нҢҢмқј SHA мЎ°нҡҢ мӢӨнҢЁ (${res.status})`);
    const data = await res.json();
    return data.sha;
  }

  async function createBranch(owner, repo, newBranch, sha, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/refs`,
      {
        method: 'POST',
        headers: githubHeaders(token),
        body: JSON.stringify({ ref: `refs/heads/${newBranch}`, sha }),
      }
    );
    if (!res.ok) throw new Error(`лёҢлһңм№ҳ мғқм„ұ мӢӨнҢЁ (${res.status})`);
  }

  async function putFile(owner, repo, path, content, message, branch, token, existingSha) {
    const body = { message, content: toBase64(content), branch };
    if (existingSha) body.sha = existingSha;

    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/${path}`,
      { method: 'PUT', headers: githubHeaders(token), body: JSON.stringify(body) }
    );
    if (!res.ok) throw new Error(`нҢҢмқј м»Өл°Ӣ мӢӨнҢЁ (${path}, ${res.status})`);
  }

  async function createPR(owner, repo, head, base, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/pulls`,
      {
        method: 'POST',
        headers: githubHeaders(token),
        body: JSON.stringify({ title: PR_TITLE, head, base, body: PR_BODY }),
      }
    );
    if (!res.ok) throw new Error(`PR мғқм„ұ мӢӨнҢЁ (${res.status})`);
    const data = await res.json();
    return data.html_url;
  }

  // в”Җв”Җ м—°кІ° н…ҢмҠӨнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  document.getElementById('btn-test').addEventListener('click', async () => {
    const { repoInput, token, baseBranch } = getFormValues();

    const parsed = parseGitHubUrl(repoInput);
    if (!parsed) return setStatus('error', ['мҳ¬л°”лҘё Repository мЈјмҶҢлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.']);
    if (!token)  return setStatus('error', ['Personal Access Tokenмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.']);

    setLoading(true);
    setStatus('info', ['м—°кІ° н…ҢмҠӨнҠё мӨ‘...']);

    try {
      const sha = await getBranchSha(parsed.owner, parsed.repo, baseBranch, token);
      setStatus('success', [
        'м—°кІ° м„ұкіө!',
        `${parsed.owner}/${parsed.repo} @ ${baseBranch}`,
        `SHA: ${sha.slice(0, 7)}`,
      ]);
    } catch (e) {
      setStatus('error', [`м—°кІ° мӢӨнҢЁ: ${e.message}`]);
    } finally {
      setLoading(false);
    }
  });

  // в”Җв”Җ Sync мӢӨн–ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  document.getElementById('btn-sync').addEventListener('click', () => {
    const { repoInput, token, baseBranch, groups } = getFormValues();

    const parsed = parseGitHubUrl(repoInput);
    if (!parsed)         return setStatus('error', ['мҳ¬л°”лҘё Repository мЈјмҶҢлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.']);
    if (!token)          return setStatus('error', ['Personal Access Tokenмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.']);
    if (groups.length === 0) return setStatus('error', ['Primitive лҳҗлҠ” Semantics мӨ‘ н•ҳлӮҳ мқҙмғҒмқ„ м„ нғқн•ҙмЈјм„ёмҡ”.']);

    // tokenмқҖ UIм—җм„ң мһҗмІҙ ліҙкҙҖ вҖ” plugin mainмңјлЎң м „лӢ¬н•ҳм§Җ м•ҠмқҢ
    pendingSyncParams = { owner: parsed.owner, repo: parsed.repo, token, baseBranch, groups };

    setLoading(true);
    setStatus('info', [`Figma ліҖмҲҳлҘј мқҪлҠ” мӨ‘... (${groups.join(', ')})`]);

    // мқ‘лӢөмқҙ м—Ҷмқ„ кІҪмҡ° мһҗлҸҷ нғҖмһ„м•„мӣғ мІҳлҰ¬
    syncTimeoutId = setTimeout(() => {
      pendingSyncParams = null;
      setLoading(false);
      setStatus('error', ['мқ‘лӢө мӢңк°„ мҙҲкіј. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.']);
    }, SYNC_TIMEOUT_MS);

    parent.postMessage({
      pluginMessage: {
        type: 'request-variables',
        payload: { owner: parsed.owner, repo: parsed.repo, baseBranch, groups },
      }
    }, '*');
  });

  // в”Җв”Җ Plugin MainмңјлЎңл¶Җн„° л©”мӢңм§Җ мҲҳмӢ  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // addEventListener мӮ¬мҡ© вҖ” onmessage м§Ғм ‘ н• лӢ№мқҖ мһ¬н• лӢ№ мӢң лҚ®м–ҙмҚЁм§ҖлҠ” мң„н—ҳмқҙ мһҲмқҢ
  window.addEventListener('message', async (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    clearTimeout(syncTimeoutId);

    if (msg.type === 'variables-data') {
      if (!pendingSyncParams) return;
      const { owner, repo, token, baseBranch, groups } = pendingSyncParams;
      const { primitiveJson, semanticsJson } = msg.payload;
      pendingSyncParams = null;

      setStatus('info', ['лёҢлһңм№ҳ мғқм„ұ мӨ‘...']);

      try {
        const baseSha = await getBranchSha(owner, repo, baseBranch, token);

        // UTC кё°мӨҖ нғҖмһ„мҠӨнғ¬н”„ лёҢлһңм№ҳлӘ… мғқм„ұ (мҳҲ: figma-sync/20240406-1430)
        const timestamp = new Date().toISOString().slice(0, 16).replace(/[-T:]/g, '').replace(/(\d{8})(\d{4})/, '$1-$2');
        const newBranch = `figma-sync/${timestamp}`;

        await createBranch(owner, repo, newBranch, baseSha, token);
        setStatus('info', ['нҢҢмқј м»Өл°Ӣ мӨ‘...']);

        // м„ нғқлҗң к·ёлЈ№мқҳ нҢҢмқјл§Ң м»Өл°Ӣ
        if (groups.includes('primitive') && primitiveJson) {
          const primSha = await getFileSha(owner, repo, FILE_PATHS.primitive, baseBranch, token);
          await putFile(owner, repo, FILE_PATHS.primitive, primitiveJson, COMMIT_MESSAGES.primitive, newBranch, token, primSha);
        }
        if (groups.includes('semantics') && semanticsJson) {
          const semSha = await getFileSha(owner, repo, FILE_PATHS.semantics, baseBranch, token);
          await putFile(owner, repo, FILE_PATHS.semantics, semanticsJson, COMMIT_MESSAGES.semantics, newBranch, token, semSha);
        }

        setStatus('info', ['PR мғқм„ұ мӨ‘...']);
        const prUrl = await createPR(owner, repo, newBranch, baseBranch, token);

        setStatus('success', ['PRмқҙ мғқм„ұлҗҳм—ҲмҠөлӢҲлӢӨ!'], { url: prUrl, label: prUrl });
      } catch (e) {
        setStatus('error', [`мҳӨлҘҳ: ${e.message}`]);
      } finally {
        setLoading(false);
      }
    }

    if (msg.type === 'error') {
      pendingSyncParams = null; // м—җлҹ¬ кІҪлЎңм—җм„ңлҸ„ нҶ нҒ° мҰүмӢң нҒҙлҰ¬м–ҙ
      setStatus('error', [`н”Ңлҹ¬к·ёмқё мҳӨлҘҳ: ${msg.message}`]);
      setLoading(false);
    }
  });
</script>
</body>
</html>
