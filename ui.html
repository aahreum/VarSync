<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarSync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 12px;
      color: #1e1e1e;
      background: #fff;
      padding: 16px;
      width: 300px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1e1e1e;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 12px;
      color: #1e1e1e;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #18a0fb;
    }

    input::placeholder {
      color: #b0b0b0;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 16px 0;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      height: 32px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-test {
      background: #f5f5f5;
      color: #1e1e1e;
    }

    #btn-test:hover:not(:disabled) {
      background: #e8e8e8;
    }

    #btn-sync {
      background: #18a0fb;
      color: #fff;
    }

    #btn-sync:hover:not(:disabled) {
      background: #0d8de0;
    }

    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }

    #status.info  { background: #e8f4fd; color: #0d5a8e; display: block; }
    #status.success { background: #e6f9ed; color: #1a7f3c; display: block; }
    #status.error   { background: #fdecea; color: #c0392b; display: block; }

    #status a {
      color: inherit;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>VarSync</h1>

  <div class="field">
    <label for="repo">GitHub Repository</label>
    <input id="repo" type="text" placeholder="owner/repo 또는 GitHub URL" />
  </div>

  <div class="field">
    <label for="token">Personal Access Token</label>
    <input id="token" type="password" placeholder="ghp_xxxxxxxxxxxx" />
  </div>

  <div class="field">
    <label for="branch">Base Branch</label>
    <input id="branch" type="text" placeholder="main" value="main" />
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button id="btn-test">연결 테스트</button>
    <button id="btn-sync">Sync to GitHub</button>
  </div>

  <div id="status"></div>

<script>
  // ── 유틸 ────────────────────────────────────────────────
  function parseGitHubUrl(input) {
    const match = input.trim().match(/(?:github\.com\/)?([^/\s]+)\/([^/\s]+?)(?:\.git)?$/);
    return match ? { owner: match[1], repo: match[2] } : null;
  }

  function setStatus(type, html) {
    const el = document.getElementById('status');
    el.className = type;
    el.innerHTML = html;
  }

  function setLoading(isLoading) {
    document.getElementById('btn-test').disabled = isLoading;
    document.getElementById('btn-sync').disabled = isLoading;
  }

  function githubHeaders(token) {
    return {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28',
    };
  }

  // ── GitHub API 헬퍼 ────────────────────────────────────
  async function getBranchSha(owner, repo, branch, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${branch}`,
      { headers: githubHeaders(token) }
    );
    if (!res.ok) throw new Error(`브랜치 조회 실패 (${res.status})`);
    const data = await res.json();
    return data.object.sha;
  }

  async function getFileSha(owner, repo, path, branch, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,
      { headers: githubHeaders(token) }
    );
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(`파일 SHA 조회 실패 (${res.status})`);
    const data = await res.json();
    return data.sha;
  }

  async function createBranch(owner, repo, newBranch, sha, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/refs`,
      {
        method: 'POST',
        headers: githubHeaders(token),
        body: JSON.stringify({ ref: `refs/heads/${newBranch}`, sha }),
      }
    );
    if (!res.ok) throw new Error(`브랜치 생성 실패 (${res.status})`);
  }

  async function putFile(owner, repo, path, content, message, branch, token, existingSha) {
    const body = {
      message,
      content: btoa(unescape(encodeURIComponent(content))),
      branch,
    };
    if (existingSha) body.sha = existingSha;

    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/${path}`,
      { method: 'PUT', headers: githubHeaders(token), body: JSON.stringify(body) }
    );
    if (!res.ok) throw new Error(`파일 커밋 실패 (${path}, ${res.status})`);
  }

  async function createPR(owner, repo, head, base, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/pulls`,
      {
        method: 'POST',
        headers: githubHeaders(token),
        body: JSON.stringify({
          title: 'chore: sync figma variables',
          head,
          base,
          body: 'Figma Variables Sync 플러그인에 의해 자동 생성된 PR입니다.',
        }),
      }
    );
    if (!res.ok) throw new Error(`PR 생성 실패 (${res.status})`);
    const data = await res.json();
    return data.html_url;
  }

  // ── 연결 테스트 ─────────────────────────────────────────
  document.getElementById('btn-test').addEventListener('click', async () => {
    const repoInput = document.getElementById('repo').value;
    const token = document.getElementById('token').value.trim();

    const parsed = parseGitHubUrl(repoInput);
    if (!parsed) return setStatus('error', '올바른 Repository 주소를 입력해주세요.');
    if (!token) return setStatus('error', 'Personal Access Token을 입력해주세요.');

    setLoading(true);
    setStatus('info', '연결 테스트 중...');

    try {
      const branch = document.getElementById('branch').value.trim() || 'main';
      const sha = await getBranchSha(parsed.owner, parsed.repo, branch, token);
      setStatus('success', `연결 성공!<br>${parsed.owner}/${parsed.repo} @ ${branch}<br>SHA: ${sha.slice(0, 7)}`);
    } catch (e) {
      setStatus('error', `연결 실패: ${e.message}`);
    } finally {
      setLoading(false);
    }
  });

  // ── Sync 실행 ───────────────────────────────────────────
  document.getElementById('btn-sync').addEventListener('click', () => {
    const repoInput = document.getElementById('repo').value;
    const token = document.getElementById('token').value.trim();
    const baseBranch = document.getElementById('branch').value.trim() || 'main';

    const parsed = parseGitHubUrl(repoInput);
    if (!parsed) return setStatus('error', '올바른 Repository 주소를 입력해주세요.');
    if (!token) return setStatus('error', 'Personal Access Token을 입력해주세요.');

    setLoading(true);
    setStatus('info', 'Figma 변수를 읽는 중...');

    // Plugin Main에 변수 요청
    parent.postMessage({
      pluginMessage: {
        type: 'request-variables',
        payload: { owner: parsed.owner, repo: parsed.repo, token, baseBranch },
      }
    }, '*');
  });

  // ── Plugin Main으로부터 메시지 수신 ─────────────────────
  window.onmessage = async (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'variables-data') {
      const { owner, repo, token, baseBranch, primitiveJson, semanticsJson } = msg.payload;

      setStatus('info', '브랜치 생성 중...');

      try {
        const baseSha = await getBranchSha(owner, repo, baseBranch, token);

        const now = new Date();
        const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        const newBranch = `figma-sync/${timestamp}`;

        await createBranch(owner, repo, newBranch, baseSha, token);
        setStatus('info', '파일 커밋 중...');

        const primitivePath = 'tokens/primitive.json';
        const semanticsPath = 'tokens/semantics.json';

        const [primSha, semSha] = await Promise.all([
          getFileSha(owner, repo, primitivePath, baseBranch, token),
          getFileSha(owner, repo, semanticsPath, baseBranch, token),
        ]);

        await putFile(owner, repo, primitivePath, primitiveJson, 'chore: sync figma primitive variables', newBranch, token, primSha);
        await putFile(owner, repo, semanticsPath, semanticsJson, 'chore: sync figma semantics variables', newBranch, token, semSha);

        setStatus('info', 'PR 생성 중...');
        const prUrl = await createPR(owner, repo, newBranch, baseBranch, token);

        setStatus('success', `PR이 생성되었습니다!<br><a href="${prUrl}" target="_blank">${prUrl}</a>`);
      } catch (e) {
        setStatus('error', `오류: ${e.message}`);
      } finally {
        setLoading(false);
      }
    }

    if (msg.type === 'error') {
      setStatus('error', `플러그인 오류: ${msg.message}`);
      setLoading(false);
    }
  };
</script>
</body>
</html>
