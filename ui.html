<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarSync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 12px;
      color: #1e1e1e;
      background: #fff;
      padding: 16px;
      width: 100%;
      min-width: 280px;
      box-sizing: border-box;
    }

    #resize-handle {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      opacity: 0.35;
      transition: opacity 0.15s;
      /* 3×3 점 패턴 */
      background-image:
        radial-gradient(circle, #888 1.2px, transparent 1.2px);
      background-size: 4px 4px;
      background-position: 2px 2px;
      background-repeat: repeat;
      -webkit-mask-image: linear-gradient(135deg, transparent 40%, #000 100%);
      mask-image: linear-gradient(135deg, transparent 40%, #000 100%);
    }

    #resize-handle:hover {
      opacity: 0.7;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1e1e1e;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 12px;
      color: #1e1e1e;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #18a0fb;
    }

    input::placeholder {
      color: #b0b0b0;
    }

    .checkbox-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #1e1e1e;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label .count {
      font-size: 11px;
      color: #888;
    }

    input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #18a0fb;
      cursor: pointer;
      flex-shrink: 0;
    }

    #collections-loading {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 16px 0;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      height: 32px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-test {
      background: #f5f5f5;
      color: #1e1e1e;
    }

    #btn-test:hover:not(:disabled) {
      background: #e8e8e8;
    }

    #btn-sync {
      background: #18a0fb;
      color: #fff;
    }

    #btn-sync:hover:not(:disabled) {
      background: #0d8de0;
    }

    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }

    #status.info    { background: #e8f4fd; color: #0d5a8e; display: block; }
    #status.success { background: #e6f9ed; color: #1a7f3c; display: block; }
    #status.error   { background: #fdecea; color: #c0392b; display: block; }

    #status a {
      color: inherit;
      font-weight: 600;
    }

    .field-hint {
      margin-top: 5px;
      padding: 6px 8px;
      background: #f7f8fa;
      border-radius: 4px;
      font-size: 10px;
      color: #777;
      line-height: 1.6;
    }

    .field-hint .scope-tag {
      display: inline-block;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 10px;
      background: #e8edf2;
      color: #3a5068;
      border-radius: 3px;
      padding: 0 4px;
    }

    .field-hint a {
      color: #18a0fb;
      text-decoration: none;
    }

    .field-hint a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>VarSync</h1>

  <div class="field">
    <label for="repo">GitHub Repository</label>
    <input id="repo" type="text" placeholder="owner/repo 또는 GitHub URL" />
  </div>

  <div class="field">
    <label for="token">Personal Access Token</label>
    <input id="token" type="password" placeholder="ghp_xxxxxxxxxxxx" />
    <div class="field-hint">
      Fine-grained PAT 필요 권한:
      <span class="scope-tag">Contents: Read &amp; Write</span>
      <span class="scope-tag">Pull requests: Read &amp; Write</span><br />
      <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">
        토큰 생성 →
      </a>
    </div>
  </div>

  <div class="field">
    <label for="branch">Base Branch</label>
    <input id="branch" type="text" placeholder="main" value="main" />
  </div>

  <div class="field">
    <label for="folder-path">저장 폴더 경로</label>
    <input id="folder-path" type="text" placeholder="tokens" value="tokens" />
  </div>

  <div class="field">
    <label>내보낼 컬렉션</label>
    <div id="collections-list" class="checkbox-row">
      <span id="collections-loading">컬렉션 목록을 불러오는 중...</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button id="btn-test">연결 테스트</button>
    <button id="btn-sync" disabled>Sync to GitHub</button>
  </div>

  <div id="status"></div>

  <!-- 리사이즈 핸들: 드래그로 플러그인 창 크기 조절 -->
  <div id="resize-handle" title="드래그하여 크기 조절"></div>

<script>
  // ── 리사이즈 핸들 ───────────────────────────────────────
  (function () {
    const handle = document.getElementById('resize-handle');
    const MIN_W = 280, MIN_H = 280, MAX_W = 800, MAX_H = 800;

    let dragging = false;
    let startX = 0, startY = 0, startW = 0, startH = 0;

    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      startW = document.documentElement.clientWidth;
      startH = document.documentElement.clientHeight;
      e.preventDefault(); // 드래그 중 텍스트 선택 방지
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const newW = Math.min(Math.max(startW + (e.clientX - startX), MIN_W), MAX_W);
      const newH = Math.min(Math.max(startH + (e.clientY - startY), MIN_H), MAX_H);
      parent.postMessage({ pluginMessage: { type: 'resize', width: newW, height: newH } }, '*');
    });

    document.addEventListener('mouseup', () => { dragging = false; });
  })();

  // ── 상수 ────────────────────────────────────────────────
  const PR_TITLE = 'chore: sync figma variables';
  const PR_BODY  = 'Figma Variables Sync 플러그인에 의해 자동 생성된 PR입니다.';
  const SYNC_TIMEOUT_MS = 15000;

  // ── 상태 ────────────────────────────────────────────────
  // token은 plugin main으로 전달하지 않고 여기서 관리
  let pendingSyncParams = null;
  let syncTimeoutId = null;
  let collectionsReady = false;

  // ── 유틸 ────────────────────────────────────────────────
  function parseGitHubUrl(input) {
    const match = input.trim().match(/(?:github\.com\/)?([^/\s]+)\/([^/\s]+?)(?:\.git)?$/);
    return match ? { owner: match[1], repo: match[2] } : null;
  }

  /** "My Collection Name" → "my-collection-name". 변환 결과가 빈 문자열이면 "untitled" 반환 */
  function toKebabCase(str) {
    const result = str
      .trim()
      .toLowerCase()
      .replace(/[\s_]+/g, '-')
      .replace(/[^a-z0-9-]/g, '')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
    return result || 'untitled';
  }

  /** 선택된 컬렉션 ID 목록을 반환 */
  function getFormValues() {
    const selectedCollectionIds = Array.from(
      document.querySelectorAll('[data-collection-id]:checked')
    ).map((el) => el.dataset.collectionId);

    // 폴더 경로: 경로 순회(..) 차단, 슬래시 정규화, 빈 경우 기본값 적용
    const folderPath = document.getElementById('folder-path').value
      .trim()
      .replace(/\\/g, '/')        // 백슬래시 → 슬래시
      .replace(/\/+/g, '/')       // 연속 슬래시 → 단일 슬래시
      .replace(/^\/+|\/+$/g, '')  // 앞뒤 슬래시 제거
      .split('/')
      .filter((seg) => seg !== '' && seg !== '.' && seg !== '..') // 빈 세그먼트·경로 순회 차단
      .join('/')
      || 'tokens';

    return {
      repoInput: document.getElementById('repo').value,
      token: document.getElementById('token').value.trim(),
      baseBranch: document.getElementById('branch').value.trim() || 'main',
      folderPath,
      selectedCollectionIds,
    };
  }

  /**
   * 상태 메시지를 DOM으로 안전하게 렌더링 (innerHTML 미사용 — XSS 방지)
   * @param {'info'|'success'|'error'} type
   * @param {string[]} lines  - 표시할 텍스트 줄 배열
   * @param {{ url: string, label: string } | null} link - 선택적 링크
   */
  function setStatus(type, lines, link = null) {
    const el = document.getElementById('status');
    el.className = type;
    el.textContent = '';

    lines.forEach((line, i) => {
      if (i > 0) el.appendChild(document.createElement('br'));
      el.appendChild(document.createTextNode(line));
    });

    if (link) {
      el.appendChild(document.createElement('br'));
      const a = document.createElement('a');
      a.href = link.url;
      a.target = '_blank';
      a.textContent = link.label;
      el.appendChild(a);
    }
  }

  function setLoading(isLoading) {
    document.getElementById('btn-test').disabled = isLoading;
    // Sync 버튼은 컬렉션이 로드된 경우에만 활성화
    document.getElementById('btn-sync').disabled = isLoading || !collectionsReady;
  }

  function githubHeaders(token) {
    return {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28',
    };
  }

  /** UTF-8 문자열을 Base64로 안전하게 인코딩 (32KB 청크 단위 처리) */
  function toBase64(str) {
    const bytes = new TextEncoder().encode(str);
    const CHUNK = 32768;
    let binary = '';
    for (let i = 0; i < bytes.length; i += CHUNK) {
      binary += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
    }
    return btoa(binary);
  }

  // ── 컬렉션 목록 렌더링 ──────────────────────────────────
  function renderCollections(collections) {
    const list = document.getElementById('collections-list');
    list.textContent = '';

    if (collections.length === 0) {
      const msg = document.createElement('span');
      msg.style.cssText = 'font-size:11px;color:#888;';
      msg.textContent = '컬렉션이 없습니다.';
      list.appendChild(msg);
      return;
    }

    collections.forEach((col) => {
      const lbl = document.createElement('label');
      lbl.className = 'checkbox-label';

      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.dataset.collectionId = col.id;
      chk.checked = true; // 기본 전체 선택

      const name = document.createTextNode(col.name);
      const count = document.createElement('span');
      count.className = 'count';
      count.textContent = `(${col.variableCount})`;

      lbl.appendChild(chk);
      lbl.appendChild(name);
      lbl.appendChild(count);
      list.appendChild(lbl);
    });

    collectionsReady = true;
    document.getElementById('btn-sync').disabled = false;
  }

  // ── GitHub API 헬퍼 ────────────────────────────────────
  async function getBranchSha(owner, repo, branch, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${branch}`,
      { headers: githubHeaders(token) }
    );
    if (!res.ok) throw new Error(`브랜치 조회 실패 (${res.status})`);
    const data = await res.json();
    return data.object.sha;
  }

  async function getFileSha(owner, repo, path, branch, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,
      { headers: githubHeaders(token) }
    );
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(`파일 SHA 조회 실패 (${res.status})`);
    const data = await res.json();
    return data.sha;
  }

  async function createBranch(owner, repo, newBranch, sha, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/git/refs`,
      {
        method: 'POST',
        headers: githubHeaders(token),
        body: JSON.stringify({ ref: `refs/heads/${newBranch}`, sha }),
      }
    );
    if (!res.ok) throw new Error(`브랜치 생성 실패 (${res.status})`);
  }

  async function putFile(owner, repo, path, content, message, branch, token, existingSha) {
    const body = { message, content: toBase64(content), branch };
    if (existingSha) body.sha = existingSha;

    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/contents/${path}`,
      { method: 'PUT', headers: githubHeaders(token), body: JSON.stringify(body) }
    );
    if (!res.ok) throw new Error(`파일 커밋 실패 (${path}, ${res.status})`);
  }

  async function createPR(owner, repo, head, base, token) {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/pulls`,
      {
        method: 'POST',
        headers: githubHeaders(token),
        body: JSON.stringify({ title: PR_TITLE, head, base, body: PR_BODY }),
      }
    );
    if (!res.ok) throw new Error(`PR 생성 실패 (${res.status})`);
    const data = await res.json();
    return data.html_url;
  }

  // ── 연결 테스트 ─────────────────────────────────────────
  document.getElementById('btn-test').addEventListener('click', async () => {
    const { repoInput, token, baseBranch } = getFormValues();

    const parsed = parseGitHubUrl(repoInput);
    if (!parsed) return setStatus('error', ['올바른 Repository 주소를 입력해주세요.']);
    if (!token)  return setStatus('error', ['Personal Access Token을 입력해주세요.']);

    setLoading(true);
    setStatus('info', ['연결 테스트 중...']);

    try {
      const sha = await getBranchSha(parsed.owner, parsed.repo, baseBranch, token);
      setStatus('success', [
        '연결 성공!',
        `${parsed.owner}/${parsed.repo} @ ${baseBranch}`,
        `SHA: ${sha.slice(0, 7)}`,
      ]);
    } catch (e) {
      setStatus('error', [`연결 실패: ${e.message}`]);
    } finally {
      setLoading(false);
    }
  });

  // ── Sync 실행 ───────────────────────────────────────────
  document.getElementById('btn-sync').addEventListener('click', () => {
    const { repoInput, token, baseBranch, folderPath, selectedCollectionIds } = getFormValues();

    const parsed = parseGitHubUrl(repoInput);
    if (!parsed)                    return setStatus('error', ['올바른 Repository 주소를 입력해주세요.']);
    if (!token)                     return setStatus('error', ['Personal Access Token을 입력해주세요.']);
    if (selectedCollectionIds.length === 0) return setStatus('error', ['하나 이상의 컬렉션을 선택해주세요.']);

    // token은 UI에서 자체 보관 — plugin main으로 전달하지 않음
    pendingSyncParams = { owner: parsed.owner, repo: parsed.repo, token, baseBranch, folderPath };

    setLoading(true);
    setStatus('info', [`Figma 변수를 읽는 중... (${selectedCollectionIds.length}개 컬렉션)`]);

    // 응답이 없을 경우 자동 타임아웃 처리
    syncTimeoutId = setTimeout(() => {
      pendingSyncParams = null;
      syncTimeoutId = null;
      setLoading(false);
      setStatus('error', ['응답 시간 초과. 다시 시도해주세요.']);
    }, SYNC_TIMEOUT_MS);

    parent.postMessage({
      pluginMessage: {
        type: 'request-variables',
        payload: { selectedCollectionIds },
      }
    }, '*');
  });

  // ── Plugin Main으로부터 메시지 수신 ─────────────────────
  // addEventListener 사용 — onmessage 직접 할당은 재할당 시 덮어써지는 위험이 있음
  window.addEventListener('message', async (event) => {
    // Figma plugin iframe: parent만 신뢰
    if (event.source !== window.parent) return;

    const msg = event.data.pluginMessage;
    if (!msg) return;

    // collections-loaded는 타임아웃과 무관하게 처리
    if (msg.type === 'collections-loaded') {
      renderCollections(msg.payload.collections);
      return;
    }

    clearTimeout(syncTimeoutId);
    syncTimeoutId = null;

    if (msg.type === 'variables-data') {
      if (!pendingSyncParams) return;
      const { owner, repo, token, baseBranch, folderPath } = pendingSyncParams;
      const files = msg.payload.files; // CollectionFilePayload[]
      pendingSyncParams = null;

      setStatus('info', ['브랜치 생성 중...']);

      try {
        const baseSha = await getBranchSha(owner, repo, baseBranch, token);

        // UTC 기준 타임스탬프 브랜치명 생성 (예: figma-sync/20240406-1430)
        const timestamp = new Date().toISOString()
          .slice(0, 16).replace('T', '').replace(/:/g, '').replace(/-/g, '')
          .replace(/(\d{8})(\d{4})/, '$1-$2');
        const newBranch = `figma-sync/${timestamp}`;

        await createBranch(owner, repo, newBranch, baseSha, token);
        setStatus('info', ['파일 커밋 중...']);

        // 모든 파일의 기존 SHA를 병렬 조회
        // 각 세그먼트를 URL 인코딩하여 공백·특수문자로 인한 잘못된 API URL 방지
        const encodeRepoPath = (p) => p.split('/').map(encodeURIComponent).join('/');
        const filePaths = files.map(
          (f) => `${folderPath}/${toKebabCase(f.collectionName)}.json`
        );
        const encodedFilePaths = filePaths.map(encodeRepoPath);

        // 컬렉션명이 kebab-case 변환 후 충돌하는 경우 조기 오류 처리
        const uniquePaths = new Set(filePaths);
        if (uniquePaths.size !== filePaths.length) {
          const seen = new Set();
          for (const p of filePaths) {
            if (seen.has(p)) throw new Error(`파일 경로 충돌: "${p}" — 컬렉션 이름을 고유하게 변경해주세요.`);
            seen.add(p);
          }
        }

        const existingShas = await Promise.all(
          encodedFilePaths.map((path) => getFileSha(owner, repo, path, baseBranch, token))
        );

        // 각 컬렉션 파일을 순차 커밋
        for (let i = 0; i < files.length; i++) {
          const { collectionName, tokensJson } = files[i];
          const existingSha = existingShas[i];
          await putFile(
            owner, repo, encodedFilePaths[i], tokensJson,
            `chore: sync "${collectionName}" tokens from Figma`,
            newBranch, token, existingSha
          );
        }

        setStatus('info', ['PR 생성 중...']);
        const prUrl = await createPR(owner, repo, newBranch, baseBranch, token);

        setStatus('success', ['PR이 생성되었습니다!'], { url: prUrl, label: prUrl });
      } catch (e) {
        setStatus('error', [`오류: ${e.message}`]);
      } finally {
        setLoading(false);
      }
    }

    if (msg.type === 'error') {
      pendingSyncParams = null; // 에러 경로에서도 토큰 즉시 클리어
      setStatus('error', [`플러그인 오류: ${msg.message}`]);
      setLoading(false);
    }
  });
</script>
</body>
</html>
